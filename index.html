<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EV Visualization</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
body { font-family: Arial; margin:0; }
.bar { cursor:pointer; }
</style>
</head>
<body>

<div id="line-chart"></div>
<div id="bar-chart"></div>

<script>
let selectedMake = null;

function drawBarChart() {
    const data = [
        {make:"Tesla", value:100},
        {make:"Ford", value:60},
        {make:"Audi", value:40}
    ];

    d3.select("#bar-chart").selectAll("*").remove();

    const svg = d3.select("#bar-chart")
        .append("svg")
        .attr("width",400)
        .attr("height",200);

    const x = d3.scaleLinear().domain([0,100]).range([0,200]);
    const y = d3.scaleBand().domain(data.map(d=>d.make)).range([0,200]).padding(0.2);

    svg.selectAll(".bar")
        .data(data)
        .enter()
        .append("rect")
        .attr("class","bar")
        .attr("x",150) /* moved right */
        .attr("y",d=>y(d.make))
        .attr("width",d=>x(d.value))
        .attr("height",y.bandwidth())
        .attr("fill",d=>{
            if(selectedMake){
                return d.make===selectedMake ? "#7c3aed" : "#9ca3af";
            }
            return "#7c3aed";
        })
        .on("click",(e,d)=>{
            selectedMake = selectedMake===d.make ? null : d.make;
            drawBarChart();
            drawLineChart();
        });

    svg.selectAll("text")
        .data(data)
        .enter()
        .append("text")
        .attr("x",10)
        .attr("y",d=>y(d.make)+15)
        .text(d=>d.make);
}

function drawLineChart() {
    d3.select("#line-chart").selectAll("*").remove();

    const data = [
        {year:2020, Tesla:50, Ford:30, Audi:20},
        {year:2021, Tesla:60, Ford:40, Audi:25},
        {year:2022, Tesla:80, Ford:50, Audi:35}
    ];

    const svg = d3.select("#line-chart")
        .append("svg")
        .attr("width",400)
        .attr("height",200);

    const x = d3.scaleLinear().domain([2020,2022]).range([50,350]);
    const y = d3.scaleLinear().domain([0,100]).range([150,20]);

    const line = d3.line()
        .x(d=>x(d.year))
        .y(d=>y(d[selectedMake] || d.Tesla));

    svg.append("path")
        .datum(data)
        .attr("fill","none")
        .attr("stroke","#7c3aed")
        .attr("stroke-width",2)
        .attr("d",line);

    // dots with tooltip
    svg.selectAll("circle")
        .data(data)
        .enter()
        .append("circle")
        .attr("cx",d=>x(d.year))
        .attr("cy",d=>y(d[selectedMake] || d.Tesla))
        .attr("r",4)
        .attr("fill","#7c3aed")
        .append("title")
        .text(d=>{
            const brand = selectedMake || "Tesla";
            return brand + ": " + d[brand] + " in " + d.year;
        });

    // label
    if(selectedMake){
        const last = data[data.length-1];
        svg.append("text")
            .attr("x",x(last.year)+5)
            .attr("y",y(last[selectedMake]))
            .text(selectedMake)
            .attr("font-size","12px")
            .attr("font-weight","bold");
    }
}

drawBarChart();
drawLineChart();
</script>

</body>
</html>
